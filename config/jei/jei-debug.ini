[debug]
	# Description: Debug mode enabled.
	# Valid Values: [true, false]
	# Default Value: false
	DebugMode = false

	# Description: Debug GUIs enabled.
	# Valid Values: [true, false]
	# Default Value: false
	DebugGuis = false

	# Description: Debug inputs enabled.
	# Valid Values: [true, false]
	# Default Value: false
	DebugInputs = false

	# Description: Add debug information to ingredient tooltips when advanced tooltips are enabled.
	# Valid Values: [true, false]
	# Default Value: false
	debugInfoTooltipsEnabled = false

	# Description: Adds ingredients to JEI that intentionally crash, to help debug JEI.
	# Valid Values: [true, false]
	# Default Value: false
	CrashingTestItemsEnabled = false

	# Description: Log information about the suffix trees used for searching, to help debug JEI.
	# Valid Values: [true, false]
	# Default Value: false
	logSuffixTreeStats = false

	# Description: Enable asynchronous loading features for improved performance. Set to false ONLY if you experience compatibility issues with specific mods.
	# Valid Values: [true, false]
	# Default Value: true
	enableAsyncLoading = true

	# Description: Enable tooltip caching for improved performance. Set to false ONLY if you experience tooltip-related crashes or issues.
	# Valid Values: [true, false]
	# Default Value: true
	enableTooltipCache = true

	# Description: Enable parallel search processing for improved performance. Set to false ONLY if you experience search-related crashes or issues.
	# Valid Values: [true, false]
	# Default Value: true
	enableParallelSearch = true

	# Description: Number of threads to use for search and filtering operations. Increasing this can speed up search on multi-core CPUs, but may increase memory usage.
	# Valid Values: An integer in the range [1, 64] (inclusive)
	# Default Value: 4
	searchThreadCount = 4


